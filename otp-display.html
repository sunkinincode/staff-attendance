<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รหัสลงทะเบียนสตาฟ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: white; } </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center">
        <h1 class="text-3xl md:text-5xl text-emerald-400 font-bold mb-4">📌 รหัส OTP เช็คชื่อ</h1>
        <p class="text-gray-400 text-lg md:text-2xl mb-8">กรุณากรอกรหัส 4 หลักนี้ ลงในมือถือของคุณ</p>
        
        <div class="bg-gray-800 border-4 border-emerald-500 rounded-3xl p-10 mb-8 inline-block shadow-[0_0_50px_rgba(16,185,129,0.3)]">
            <span id="otpCode" class="text-7xl md:text-9xl font-extrabold tracking-[0.2em] ml-[0.2em] text-white font-mono">----</span>
        </div>

        <div class="w-full max-w-md mx-auto bg-gray-700 rounded-full h-4 mb-2 overflow-hidden">
            <div id="progressBar" class="bg-emerald-500 h-4 rounded-full transition-all duration-100 ease-linear" style="width: 100%"></div>
        </div>
        <p class="text-gray-400">รหัสจะเปลี่ยนใน <span id="timeCount" class="font-bold text-emerald-400">15</span> วินาที</p>
    </div>

    <script>
        function updateOTPDisplay() {
            const now = Date.now();
            const timeWindow = Math.floor(now / 15000); // รอบละ 15 วิ
            const secret = 847291; // ต้องตรงกับฝั่งเซิร์ฟเวอร์
            
            // คำนวณ OTP เหมือนฝั่งเซิร์ฟเวอร์
            let otp = Math.abs((timeWindow * secret) % 10000).toString();
            while (otp.length < 4) otp = "0" + otp; // เติม 0 ข้างหน้าให้ครบ
            
            document.getElementById('otpCode').innerText = otp;

            // คำนวณหลอดเวลา
            const msPassed = now % 15000;
            const secondsLeft = Math.ceil((15000 - msPassed) / 1000);
            const percentage = ((15000 - msPassed) / 15000) * 100;

            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('timeCount').innerText = secondsLeft;
            
            // เปลี่ยนสีหลอดใกล้หมดเวลา
            const bar = document.getElementById('progressBar');
            if (secondsLeft <= 3) bar.classList.replace('bg-emerald-500', 'bg-red-500');
            else bar.classList.replace('bg-red-500', 'bg-emerald-500');
        }

        setInterval(updateOTPDisplay, 50); // รีเฟรชทุก 50ms ให้หลอดสมูท
        updateOTPDisplay(); // รันครั้งแรกทันที
    </script>
</body>
</html>
